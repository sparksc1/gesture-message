<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>살아있는 그림자</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Helvetica Neue', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 시작 화면 ── */
  #startScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
    padding: 32px;
    text-align: center;
  }
  .app-title { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; line-height: 1.1; }
  .app-title span { color: #7DF9FF; }
  .app-desc { font-size: 0.9rem; color: #888; line-height: 1.7; max-width: 300px; }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 340px;
  }
  .mode-btn {
    background: #111;
    border: 2px solid #222;
    border-radius: 16px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .mode-btn.selected { border-color: #7DF9FF; background: #0a1a1a; }
  .mode-btn .mode-icon { font-size: 1.8rem; }
  .mode-btn .mode-name { font-size: 0.85rem; font-weight: 700; color: #ccc; }
  .mode-btn.selected .mode-name { color: #7DF9FF; }
  .mode-btn .mode-desc { font-size: 0.68rem; color: #555; text-align: center; }

  .start-btn {
    background: #7DF9FF;
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
  }

  /* ── 카메라 화면 ── */
  #cameraScreen {
    display: none;
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #video {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #bgCanvas, #shadowCanvas, #effectCanvas {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #bgCanvas { display: none; }
  #shadowCanvas { pointer-events: none; }
  #effectCanvas { pointer-events: none; }

  /* UI */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 10;
  }
  .back-btn {
    background: rgba(255,255,255,0.15);
    border: none; color: #fff;
    border-radius: 50%;
    width: 40px; height: 40px;
    font-size: 1.1rem; cursor: pointer;
  }
  .mode-indicator {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(125,249,255,0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.8rem; color: #7DF9FF; font-weight: 700;
  }

  .status-box {
    position: absolute;
    bottom: 130px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 12px 20px;
    text-align: center;
    min-width: 240px;
    z-index: 10;
    pointer-events: none;
  }
  .status-step { font-size: 0.7rem; color: #7DF9FF; font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
  .status-text { font-size: 0.88rem; color: #ddd; line-height: 1.5; white-space: pre-line; }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 32px 44px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 28px;
    z-index: 10;
  }
  .capture-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 4px solid #fff;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    font-size: 1.8rem;
    position: relative;
  }
  .capture-btn::after {
    content: '';
    position: absolute;
    inset: -8px; border-radius: 50%;
    border: 2px solid rgba(125,249,255,0.4);
  }
  .reset-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; border-radius: 50px;
    padding: 10px 20px; font-size: 0.85rem; cursor: pointer;
  }

  /* 카운트다운 */
  #countdown {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 6rem; font-weight: 900;
    color: #7DF9FF;
    text-shadow: 0 0 40px rgba(125,249,255,0.8);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
    pointer-events: none;
  }
  #countdown.visible { opacity: 1; }

  /* 공포 비네트 */
  .horror-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(150,0,0,0.65) 100%);
    opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 5;
  }
  .horror-vignette.active { opacity: 1; }

  /* 파티클 */
  .particle {
    position: absolute; pointer-events: none;
    font-size: 1.5rem;
    animation: floatUp 2s ease-out forwards;
    z-index: 20;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
  }

  /* SF 스캔라인 */
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(to right, transparent, #7DF9FF, transparent);
    animation: scanDown 2s linear infinite; pointer-events: none; z-index: 6;
  }
  @keyframes scanDown { 0% { top: 0; } 100% { top: 100%; } }

  @keyframes flicker {
    0%,89%,91%,95%,100% { opacity: 1; }
    90%,96% { opacity: 0.2; }
  }
  .flickering { animation: flicker 2.5s infinite; }
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="startScreen">
  <div class="app-title">살아있는<br><span>그림자</span></div>
  <p class="app-desc">카메라 앞에 손이나 물체를 갖다 대면<br>그림자처럼 인식하고… 빼면 살아 움직여요! 👻</p>

  <div class="mode-grid">
    <div class="mode-btn selected" data-mode="horror">
      <div class="mode-icon">👻</div>
      <div class="mode-name">공포</div>
      <div class="mode-desc">붉은 눈이 생기고 점프스케어</div>
    </div>
    <div class="mode-btn" data-mode="cute">
      <div class="mode-icon">🐱</div>
      <div class="mode-name">귀여운</div>
      <div class="mode-desc">통통 튀며 하트가 뿅뿅</div>
    </div>
    <div class="mode-btn" data-mode="scifi">
      <div class="mode-icon">⚡</div>
      <div class="mode-name">SF</div>
      <div class="mode-desc">글리치 후 픽셀로 분해</div>
    </div>
    <div class="mode-btn" data-mode="liquid">
      <div class="mode-icon">🌊</div>
      <div class="mode-name">액체</div>
      <div class="mode-desc">녹아서 흘러내림</div>
    </div>
  </div>

  <button class="start-btn" id="startBtn">카메라 시작 📷</button>
</div>

<!-- 카메라 화면 -->
<div id="cameraScreen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="bgCanvas"></canvas>
  <canvas id="shadowCanvas"></canvas>
  <canvas id="effectCanvas"></canvas>

  <div class="horror-vignette" id="horrorVignette"></div>

  <div class="top-bar">
    <button class="back-btn" id="backBtn">←</button>
    <div class="mode-indicator" id="modeIndicator">👻 공포</div>
    <div style="width:40px"></div>
  </div>

  <div id="countdown"></div>

  <div class="status-box">
    <div class="status-step" id="statusStep">STEP 1</div>
    <div class="status-text" id="statusText">배경을 비워두고\n📸 버튼을 눌러 배경을 저장하세요</div>
  </div>

  <div class="bottom-bar">
    <button class="reset-btn" id="resetBtn">다시 시작</button>
    <button class="capture-btn" id="captureBtn">📸</button>
  </div>
</div>

<script>
let selectedMode = 'horror';
// States: 'idle' → 'bg_saved' → 'object_placed' → 'animating'
let appState = 'idle';
let stream = null;
let animFrame = null;
let bgImageData = null;
let shadowImageData = null;
let shadowBounds = null;
let liveLoopId = null;

const video = document.getElementById('video');
const bgCanvas = document.getElementById('bgCanvas');
const shadowCanvas = document.getElementById('shadowCanvas');
const effectCanvas = document.getElementById('effectCanvas');
const bgCtx = bgCanvas.getContext('2d');
const sCtx = shadowCanvas.getContext('2d');
const eCtx = effectCanvas.getContext('2d');

// 모드 선택
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMode = btn.dataset.mode;
  });
});

// 카메라 시작
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();

    const W = window.innerWidth, H = window.innerHeight;
    [bgCanvas, shadowCanvas, effectCanvas].forEach(c => { c.width = W; c.height = H; });

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('cameraScreen').style.display = 'block';
    updateModeIndicator();
    setStatus('idle');
  } catch(e) {
    alert('카메라 권한을 허용해주세요!');
  }
});

// 캡처 버튼
document.getElementById('captureBtn').addEventListener('click', () => {
  if (appState === 'idle') {
    // 배경 저장
    captureBg();
  } else if (appState === 'bg_saved') {
    // 물체 실루엣 캡처
    captureObject();
  } else if (appState === 'object_placed') {
    // 애니메이션 시작
    startAnimation();
  }
});

// 배경 저장
function captureBg() {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.save();
  bgCtx.translate(W, 0); bgCtx.scale(-1, 1);
  bgCtx.drawImage(video, 0, 0, W, H);
  bgCtx.restore();
  bgImageData = bgCtx.getImageData(0, 0, W, H);
  appState = 'bg_saved';
  setStatus('bg_saved');
  // 라이브 차분 시작
  startDiffLoop();
}

// 라이브 배경 차분 루프 (물체 윤곽 실시간 표시)
function startDiffLoop() {
  const W = bgCanvas.width, H = bgCanvas.height;
  function loop() {
    if (appState !== 'bg_saved') return;
    // 현재 프레임 임시 캔버스
    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    const tCtx = tmp.getContext('2d');
    tCtx.save();
    tCtx.translate(W, 0); tCtx.scale(-1, 1);
    tCtx.drawImage(video, 0, 0, W, H);
    tCtx.restore();
    const cur = tCtx.getImageData(0, 0, W, H);
    const bg = bgImageData.data;
    const cd = cur.data;

    // 차분 → 실루엣
    const out = new Uint8ClampedArray(cd.length);
    for (let i = 0; i < cd.length; i += 4) {
      const dr = Math.abs(cd[i] - bg[i]);
      const dg = Math.abs(cd[i+1] - bg[i+1]);
      const db = Math.abs(cd[i+2] - bg[i+2]);
      const diff = (dr + dg + db) / 3;
      if (diff > 25) {
        // 어두운 그림자 색
        out[i] = 30; out[i+1] = 30; out[i+2] = 40; out[i+3] = 200;
      } else {
        out[i+3] = 0;
      }
    }
    const outImg = new ImageData(out, W, H);
    sCtx.clearRect(0, 0, W, H);
    sCtx.putImageData(outImg, 0, 0);

    liveLoopId = requestAnimationFrame(loop);
  }
  liveLoopId = requestAnimationFrame(loop);
}

// 물체 실루엣 캡처 (현재 차분 이미지를 고정)
function captureObject() {
  if (liveLoopId) cancelAnimationFrame(liveLoopId);

  const W = bgCanvas.width, H = bgCanvas.height;

  // 현재 shadowCanvas의 픽셀을 shadowImageData로 저장
  shadowImageData = sCtx.getImageData(0, 0, W, H);

  // 바운딩 박스
  const d = shadowImageData.data;
  let minX = W, maxX = 0, minY = H, maxY = 0;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] > 100) {
      const px = (i/4) % W;
      const py = Math.floor((i/4) / W);
      if (px < minX) minX = px;
      if (px > maxX) maxX = px;
      if (py < minY) minY = py;
      if (py > maxY) maxY = py;
    }
  }
  shadowBounds = { minX, maxX, minY, maxY,
    cx: (minX+maxX)/2, cy: (minY+maxY)/2,
    w: maxX-minX, h: maxY-minY };

  appState = 'object_placed';
  setStatus('object_placed');
}

// 애니메이션 시작
function startAnimation() {
  appState = 'animating';
  setStatus('animating');
  sCtx.clearRect(0, 0, shadowCanvas.width, shadowCanvas.height);

  switch(selectedMode) {
    case 'horror': animateHorror(); break;
    case 'cute':   animateCute();   break;
    case 'scifi':  animateScifi();  break;
    case 'liquid': animateLiquid(); break;
  }
}

// ── 공포 모드 ──
function animateHorror() {
  document.getElementById('horrorVignette').classList.add('active');
  effectCanvas.classList.add('flickering');
  let t0 = null;
  const dur = 5000;
  let phase = 0;

  function frame(ts) {
    if (!t0) t0 = ts;
    const el = ts - t0;
    const p = Math.min(el / dur, 1);
    phase += 0.25;

    eCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);

    const ox = p > 0.3 ? Math.sin(phase * 7) * p * 10 : 0;
    const oy = p > 0.3 ? Math.cos(phase * 5) * p * 6 : 0;
    const driftY = p * 40;
    const alpha = 1 - Math.pow(p, 2);

    eCtx.save();
    eCtx.globalAlpha = alpha;
    eCtx.translate(ox, oy + driftY);
    eCtx.putImageData(shadowImageData, 0, 0);
    eCtx.restore();

    // 붉은 눈
    if (p > 0.35 && p < 0.75 && shadowBounds) {
      const ea = Math.sin((p - 0.35) / 0.4 * Math.PI);
      eCtx.save();
      eCtx.globalAlpha = ea * 0.9;
      eCtx.fillStyle = '#ff0000';
      eCtx.shadowColor = '#ff2200';
      eCtx.shadowBlur = 25;
      const ex = shadowBounds.cx + ox;
      const ey = shadowBounds.cy + driftY + oy - shadowBounds.h * 0.05;
      eCtx.beginPath(); eCtx.arc(ex - shadowBounds.w*0.12, ey, 9, 0, Math.PI*2); eCtx.fill();
      eCtx.beginPath(); eCtx.arc(ex + shadowBounds.w*0.12, ey, 9, 0, Math.PI*2); eCtx.fill();
      eCtx.restore();
    }

    if (p < 1) {
      animFrame = requestAnimationFrame(frame);
    } else {
      jumpScare();
    }
  }
  animFrame = requestAnimationFrame(frame);
}

function jumpScare() {
  effectCanvas.classList.remove('flickering');
  eCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
  eCtx.fillStyle = 'rgba(180,0,0,0.45)';
  eCtx.fillRect(0, 0, effectCanvas.width, effectCanvas.height);
  if (shadowImageData) {
    eCtx.save();
    eCtx.translate(effectCanvas.width/2, effectCanvas.height/2);
    eCtx.scale(1.6, 1.6);
    eCtx.translate(-effectCanvas.width/2, -effectCanvas.height/2);
    eCtx.putImageData(shadowImageData, 0, 0);
    eCtx.restore();
  }
  setTimeout(() => {
    document.getElementById('horrorVignette').classList.remove('active');
    eCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
    resetToIdle();
  }, 900);
}

// ── 귀여운 모드 ──
function animateCute() {
  let t0 = null;
  const dur = 4500;
  let heartTimer = 0;

  function frame(ts) {
    if (!t0) t0 = ts;
    const el = ts - t0;
    const p = Math.min(el / dur, 1);

    eCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);

    const bounce = Math.abs(Math.sin(el * 0.005)) * 22;
    const alpha = p < 0.8 ? 1 : 1 - (p - 0.8) / 0.2;
    const scale = 1 + Math.sin(el * 0.004) * 0.06;

    eCtx.save();
    eCtx.globalAlpha = alpha;
    if (shadowBounds) {
      eCtx.translate(shadowBounds.cx, shadowBounds.cy + shadowBounds.h/2);
      eCtx.scale(scale, scale);
      eCtx.translate(-shadowBounds.cx, -shadowBounds.cy - shadowBounds.h/2);
    }
    eCtx.translate(0, -bounce);
    eCtx.putImageData(shadowImageData, 0, 0);

    if (shadowBounds) {
      eCtx.font = 'bold 30px Arial';
      eCtx.textAlign = 'center';
      eCtx.fillText('👀', shadowBounds.cx, shadowBounds.cy - bounce - shadowBounds.h * 0.08);
    }
    eCtx.restore();

    heartTimer += 16;
    if (heartTimer > 450 && shadowBounds) {
      heartTimer = 0;
      spawnParticle(
        shadowBounds.cx + (Math.random()-0.5)*70,
        shadowBounds.cy - bounce - shadowBounds.h/2,
        ['❤️','✨','⭐','💫','🌟'][Math.floor(Math.random()*5)]
      );
    }

    if (p < 1) animFrame = requestAnimationFrame(frame);
    else resetToIdle();
  }
  animFrame = requestAnimationFrame(frame);
}

function spawnParticle(x, y, emoji) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.getElementById('cameraScreen').appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ── SF 모드 ──
function animateScifi() {
  const sl = document.createElement('div');
  sl.className = 'scan-line';
  document.getElementById('cameraScreen').appendChild(sl);

  let t0 = null;
  const dur = 4500;
  let glitchTimer = 0, glitchOn = false;
  const W = effectCanvas.width, H = effectCanvas.height;

  function frame(ts) {
    if (!t0) t0 = ts;
    const el = ts - t0;
    const p = Math.min(el / dur, 1);

    eCtx.clearRect(0, 0, W, H);

    glitchTimer += 16;
    if (glitchTimer > 280) { glitchTimer = 0; glitchOn = !glitchOn; }
    const gx = glitchOn ? (Math.random()-0.5)*18 : 0;

    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    const tCtx = tmp.getContext('2d');
    tCtx.putImageData(shadowImageData, 0, 0);

    eCtx.save();
    eCtx.globalAlpha = 1 - p * 0.85;
    eCtx.translate(gx, 0);
    eCtx.drawImage(tmp, 0, 0);
    eCtx.restore();

    // 사이안 글로우
    eCtx.save();
    eCtx.globalAlpha = (1-p) * 0.45;
    eCtx.globalCompositeOperation = 'screen';
    eCtx.fillStyle = '#7DF9FF';
    eCtx.translate(gx+3, 0);
    eCtx.drawImage(tmp, 0, 0);
    eCtx.restore();

    // 분해 파티클
    if (shadowBounds && p > 0.15) {
      const cnt = Math.floor(p * 18);
      for (let i = 0; i < cnt; i++) {
        const px = shadowBounds.minX + Math.random() * shadowBounds.w;
        const py = shadowBounds.minY + Math.random() * shadowBounds.h;
        eCtx.fillStyle = `rgba(125,249,255,${Math.random()*0.9})`;
        eCtx.fillRect(px + (Math.random()-0.5)*35*p, py - p*25, Math.random()*4+1, Math.random()*4+1);
      }
    }

    if (p < 1) animFrame = requestAnimationFrame(frame);
    else { sl.remove(); resetToIdle(); }
  }
  animFrame = requestAnimationFrame(frame);
}

// ── 액체 모드 ──
function animateLiquid() {
  let t0 = null;
  const dur = 4500;

  function frame(ts) {
    if (!t0) t0 = ts;
    const el = ts - t0;
    const p = Math.min(el / dur, 1);

    eCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);

    if (shadowImageData && shadowBounds) {
      const drip = p * effectCanvas.height * 0.45;
      const squeeze = 1 + p * 0.35;
      const alpha = 1 - Math.pow(p, 1.4);

      for (let layer = 0; layer < 3; layer++) {
        const waveX = Math.sin(el*0.003 + layer*1.2) * 12 * p;
        eCtx.save();
        eCtx.globalAlpha = alpha * (1 - layer*0.25);
        eCtx.translate(waveX, drip + layer*18*p);
        eCtx.transform(squeeze, 0, 0, 1 - p*0.25, -(squeeze-1)*shadowBounds.cx, 0);
        eCtx.putImageData(shadowImageData, 0, 0);
        eCtx.restore();
      }

      if (p > 0.25) {
        const cnt = Math.floor(p * 10);
        for (let i = 0; i < cnt; i++) {
          const dx = shadowBounds.minX + (i/cnt)*shadowBounds.w + Math.sin(el*0.004+i)*18;
          const dy = shadowBounds.maxY + drip + i*22*p;
          const sz = Math.max(0, (5 - i*0.4) * (1-p));
          eCtx.save();
          eCtx.fillStyle = `rgba(40,40,65,${alpha*0.85})`;
          eCtx.beginPath();
          eCtx.ellipse(dx, dy, sz, sz*1.6, 0, 0, Math.PI*2);
          eCtx.fill();
          eCtx.restore();
        }
      }
    }

    if (p < 1) animFrame = requestAnimationFrame(frame);
    else resetToIdle();
  }
  animFrame = requestAnimationFrame(frame);
}

// ── 리셋 ──
function resetToIdle() {
  appState = 'idle';
  bgImageData = null;
  shadowImageData = null;
  shadowBounds = null;
  eCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
  sCtx.clearRect(0, 0, shadowCanvas.width, shadowCanvas.height);
  setStatus('idle');
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (liveLoopId) cancelAnimationFrame(liveLoopId);
  document.getElementById('horrorVignette').classList.remove('active');
  effectCanvas.classList.remove('flickering');
  resetToIdle();
});

document.getElementById('backBtn').addEventListener('click', () => {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (liveLoopId) cancelAnimationFrame(liveLoopId);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('cameraScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
  appState = 'idle';
});

// ── 상태 텍스트 ──
function setStatus(state) {
  const step = document.getElementById('statusStep');
  const text = document.getElementById('statusText');
  const btn = document.getElementById('captureBtn');
  if (state === 'idle') {
    step.textContent = 'STEP 1';
    text.textContent = '배경만 보이게 하고\n📸 버튼으로 배경을 저장하세요';
    btn.textContent = '📸';
  } else if (state === 'bg_saved') {
    step.textContent = 'STEP 2';
    text.textContent = '손이나 물체를 카메라 앞에 대세요\n실루엣이 보이면 ✅ 버튼을 누르세요';
    btn.textContent = '✅';
  } else if (state === 'object_placed') {
    step.textContent = 'STEP 3';
    text.textContent = '물체를 빠르게 치우고\n▶️ 버튼을 누르세요!';
    btn.textContent = '▶️';
  } else if (state === 'animating') {
    step.textContent = '✨ 살아있다!';
    text.textContent = '그림자가 움직이고 있어요...';
    btn.textContent = '⏹';
  }
}

function updateModeIndicator() {
  const icons = { horror:'👻 공포', cute:'🐱 귀여운', scifi:'⚡ SF', liquid:'🌊 액체' };
  document.getElementById('modeIndicator').textContent = icons[selectedMode];
}
</script>
